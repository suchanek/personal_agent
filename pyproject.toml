[tool.poetry]
name = "personal-agent"
version = "0.3.0"
description = "Personal AI agent with MCP, SQLite memory, and LanceDB vector storage"
authors = ["Your Name <your.email@example.com>"]

[tool.poetry.dependencies]
python = ">=3.11,<4.0"
# Core AI framework (replaced langchain + smolagents)
agno = "^1.5.8"
# Vector database and search
lancedb = "^0.23.0"
tantivy = "^0.24.0"
# Model Context Protocol support
mcp = "^1.9.2"
# Web interface
streamlit = "^1.40.0"
# HTTP and API dependencies
requests = "^2.32.3"
litellm = "^1.71.3"
# Utilities
rich = "^14.0.0"
python-dotenv = "^1.1.0"
markdownify = "^1.1.0"
nest-asyncio = "^1.6.0"
# Data sources and tools
duckduckgo-search = "^8.0.2"
duckdb = "^1.3.0"
yfinance = "^0.2.61"
pylance = "^0.29.0"

[tool.poetry.scripts]
# Main entry points for Personal AI Agent (Streamlit-based system)
personal-agent = "personal_agent.streamlit.main:streamlit_main"
personal-agent-cli = "personal_agent.agno_main:cli_main"
personal-agent-streamlit = "personal_agent.streamlit.main:streamlit_main"
# Convenience aliases
cli = "personal_agent.streamlit.main:cli_main"
ocli = "personal_agent.agno_main:cli_main"
# Setup and testing utilities
install-mcp-servers = "scripts.install_mcp:main"
test-mcp-servers = "tests.test_mcp_availability:main"
test-tools = "tests.test_tools:main"
store-fact = "scripts.store_fact:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
