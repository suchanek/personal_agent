[tool.poetry]
name = "personal-agent"
version = "0.5.2"
license = "BSD-3-Clause"
description = "Personal AI agent with MCP and sqlite support, using Agno for advanced capabilities."
authors = ["Eric Suchanek <suchanek@mac.com>"]

[tool.poetry.dependencies]
python = ">=3.11,<4.0"
langchain = "^0.3.0"
langchain-ollama = "^0.3.3"
langchain-community = "^0.3.0"
weaviate-client = "^4.8.1"
flask = "^3.0.3"
hypercorn = "^0.17.3"
requests = "^2.32.3"
langchain-weaviate = "^0.0.4"
rich = "^14.0.0"
python-dotenv = "^1.1.0"
smolagents = "^1.17.0"
litellm = "^1.71.3"
markdownify = "^1.1.0"
pathlib = "^1.0.1"
duckduckgo-search = "^8.0.2"
duckdb = "^1.3.0"
yfinance = "^0.2.61"
agno = "^1.5.8"
mcp = "^1.9.2"
pgvector = "^0.4.1"

[tool.poetry.scripts]
# Main simplified entry points
personal-agent = "main:main"
paga_cli = "src.personal_agent.main:cli_main"
paga_web = "src.personal_agent.main:web_main"

# Legacy entry points for compatibility
personal-agent-langchain = "src.personal_agent.main:main"
personal-agent-langchain-cli = "src.personal_agent.main:cli_main"
personal-agent-smolagent = "src.personal_agent.smol_main:run_smolagents_web"
personal-agent-smolagent-cli = "src.personal_agent.smol_main:cli_main"

# Utility scripts
install-mcp-servers = "scripts.install_mcp:main"
test-mcp-servers = "tests.test_mcp_availability:main"
test-tools = "tests.test_tools:main"
store-fact = "scripts.store_fact:main"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
