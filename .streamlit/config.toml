[theme]
base = "light"  # Default base theme: "light" or "dark"
primaryColor = "#FF4B4B"  # Accent color for buttons, etc.
backgroundColor = "#FFFFFF"  # Background for light theme
secondaryBackgroundColor = "#F0F2F6"  # Secondary background (e.g., sidebar)
textColor = "#31333F"  # Text color
font = "sans serif"

[server]
# Performance settings
maxUploadSize = 200

[browser]
# Gather usage stats
gatherUsageStats = false
